name: Fetch Subscriptions

on:
  push:
    paths:
      - '.github/workflows/fetch.yaml'
      - 'w38.py'
      - 'config.yaml'
  workflow_dispatch:
  schedule:
    - cron: 0 */3 * * *
    

jobs:
  fetch:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 安装依赖
        run: |
          pip install pyyaml requests loguru tqdm retry

      - name: 执行任务
        env:
          TZ: Asia/Shanghai 
        run: |
          python w38.py

      - name: 提交并推送更改
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. 配置用户信息
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          # 2. 将当前更改放入暂存区，防止拉取冲突
          git stash --include-untracked
          
          # 3. 拉取最新代码（防止冲突）
          git pull --rebase origin main
          
          # 4. 恢复之前的更改
          git stash pop || echo "No stash to pop"
          
          # 5. 添加更改
          git add latest.yaml url.txt channel_stats.csv
          
          # 6. 检查是否有变更，有则提交，无则静默退出
          if git diff --quiet --cached; then
            echo "没有检测到文件变更，跳过提交。"
          else
            git commit -m "Auto-update nodes: $(date '+%Y-%m-%d %H:%M:%S')"
            git push origin main
          fi
