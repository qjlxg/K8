name: Node Extraction Workflow

on:
  push:
    paths:
      - 'deep_extract.py'
      - 'converter.py'
      - 'latest.yaml'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  extract:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install pyyaml requests loguru

      - name: Run extraction script
        run: python deep_extract.py

      - name: Convert to URI list
        run: python converter.py

      - name: Commit and push changes
        run: |
          git config --global user.name 'github-actions'
          git config --global user.email 'github-actions@github.com'
          
          # 只检查根目录下的 all_nodes.txt
          if [ -n "$(git status --porcelain all_nodes.txt)" ]; then
            git add all_nodes.txt
            git commit -m "Auto-update nodes: $(date '+%Y-%m-%d %H:%M:%S')"
            git push
          else
            echo "No changes to commit."
          fi
